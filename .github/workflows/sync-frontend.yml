name: Sync Frontend to taskmaster-frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Push frontend files to taskmaster-frontend
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.FRONTEND_SYNC_TOKEN }}
        with:
          source-directory: 'frontend/src'
          destination-github-username: 'codezenithshashwat'
          destination-repository-name: 'taskmaster-frontend'
          target-directory: 'src'
          target-branch: 'main'
          commit-message: 'Sync frontend from taskmaster backend repo'
          user-name: 'github-actions[bot]'
          user-email: 'github-actions[bot]@users.noreply.github.com'
